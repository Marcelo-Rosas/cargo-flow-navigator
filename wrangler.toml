name = "cargo-flow-navigator"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Variáveis de ambiente para Cloudflare Pages
# NUNCA coloque valores reais aqui — use "wrangler secret put VITE_CFN_API_KEY"
# ou configure no dashboard: Cloudflare Pages → Settings → Environment Variables
[vars]
# VITE_CFN_API_KEY deve ser configurado como secret no dashboard da Cloudflare
