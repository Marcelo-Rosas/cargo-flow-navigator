name: Deploy Cargo Flow Navigator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Detectar quais categorias de arquivos mudaram ───
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      migration: ${{ steps.filter.outputs.migration }}
      edge_function: ${{ steps.filter.outputs.edge_function }}
      edge_functions_list: ${{ steps.list-fns.outputs.functions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'package.json'
              - 'package-lock.json'
              - 'wrangler.json'
              - 'wrangler.toml'
            migration:
              - 'supabase/migrations/**'
            edge_function:
              - 'supabase/functions/**'

      - name: List altered Edge Functions
        id: list-fns
        if: steps.filter.outputs.edge_function == 'true'
        run: |
          set -euo pipefail
          # supabase/functions/_shared/... yields segment "_shared" — not a deployable function name (must start with a letter).
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' || true)
          VALID_NAMES=""
          while IFS= read -r name; do
            [[ -z "$name" ]] && continue
            if [[ "$name" =~ ^[A-Za-z][A-Za-z0-9_-]*$ ]] && [[ -f "supabase/functions/$name/index.ts" ]]; then
              VALID_NAMES="${VALID_NAMES}${name}"$'\n'
            fi
          done < <(echo "$CHANGED" | cut -d'/' -f3 | sort -u)
          # _shared affects many functions: always redeploy all deployable folders (union with diff hits).
          if echo "$CHANGED" | grep -q '^supabase/functions/_shared/'; then
            for d in supabase/functions/*/; do
              [[ -d "$d" ]] || continue
              base=$(basename "$d")
              [[ "$base" == _shared ]] && continue
              [[ -f "${d}index.ts" ]] && VALID_NAMES="${VALID_NAMES}${base}"$'\n'
            done
          fi
          # Shared-only changes (no direct function folder in diff): redeploy every function with index.ts.
          if [[ -z "$(echo "$VALID_NAMES" | tr -d '[:space:]')" ]] && [[ -n "$(echo "$CHANGED" | tr -d '[:space:]')" ]]; then
            for d in supabase/functions/*/; do
              [[ -d "$d" ]] || continue
              base=$(basename "$d")
              [[ "$base" == _shared ]] && continue
              [[ -f "${d}index.ts" ]] && VALID_NAMES="${VALID_NAMES}${base}"$'\n'
            done
          fi
          FUNCS_LINES=$(echo "$VALID_NAMES" | sort -u | grep -v '^$' || true)
          if [[ -z "$FUNCS_LINES" ]]; then
            FUNCTIONS='[]'
          else
            FUNCTIONS=$(echo "$FUNCS_LINES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "functions=$FUNCTIONS" >> "$GITHUB_OUTPUT"

  # ─── Supabase Migrations ───
  deploy-migrations:
    needs: detect-changes
    if: needs.detect-changes.outputs.migration == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref epgedaiukjippepujuzc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── Supabase Edge Functions ───
  deploy-edge-functions:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.edge_function == 'true' &&
      github.event_name == 'push' &&
      needs.detect-changes.outputs.edge_functions_list != '[]' &&
      needs.detect-changes.outputs.edge_functions_list != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: ${{ fromJson(needs.detect-changes.outputs.edge_functions_list) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref epgedaiukjippepujuzc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ${{ matrix.function }}
        run: supabase functions deploy ${{ matrix.function }} --project-ref epgedaiukjippepujuzc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── Build + Deploy Cloudflare Pages ───
  deploy-frontend:
    needs: [detect-changes, deploy-migrations]
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.deploy-migrations.result == 'success' || needs.deploy-migrations.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Supabase types (if migration ran)
        if: needs.deploy-migrations.result == 'success'
        run: |
          npx supabase gen types typescript \
            --project-id epgedaiukjippepujuzc \
            > src/integrations/supabase/types.generated.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Patch wrangler for Pages
        run: node scripts/patch-wrangler-pages.mjs

      # Production deploy (push to main)
      - name: Deploy to Cloudflare Pages (Production)
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cargo-flow-navigator --branch=main

      # Preview deploy (pull request)
      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'pull_request'
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cargo-flow-navigator --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Preview deploy pronto!**\n\nURL: https://pr-${{ github.event.pull_request.number }}.cargo-flow-navigator.pages.dev\n\nCommit: `' + context.sha.substring(0, 7) + '`'
            })

  # ─── Notificação final ───
  notify-status:
    needs: [detect-changes, deploy-migrations, deploy-edge-functions, deploy-frontend]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Summarize deploy
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend changed | ${{ needs.detect-changes.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration changed | ${{ needs.detect-changes.outputs.migration }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Function changed | ${{ needs.detect-changes.outputs.edge_function }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ${{ needs.deploy-migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Functions | ${{ needs.deploy-edge-functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
