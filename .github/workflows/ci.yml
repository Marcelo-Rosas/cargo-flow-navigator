# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main, master, develop, feat/*]
  pull_request:
    branches: [main, master, develop, feat/*]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build

  # Valida migrations via Session pooler (IPv4). Requer secret SUPABASE_DB_URL.
  # Obtenha em: Supabase Dashboard → Connect → Session pooler (porta 5432)
  supabase-migrate-check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    # Valida migrations se SUPABASE_DB_URL estiver definido.
    # Se o secret não existir, este job roda mas a etapa de validação falhará gracefully.
    # PRs de forks: secret vazio → validação skipped.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Supabase migrations
        if: env.SUPABASE_DB_URL != ''
        run: |
          npx supabase db push --db-url "$SUPABASE_DB_URL" --dry-run
