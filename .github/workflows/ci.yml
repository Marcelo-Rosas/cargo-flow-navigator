name: CI

on:
  push:
    branches: [main, master, develop, feat/*]
  pull_request:
    branches: [main, master, develop, feat/*]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build

  # Valida migrations via Session pooler (IPv4). Requer secret SUPABASE_DB_URL.
  # Obtenha em: Supabase Dashboard → Connect → Session pooler (porta 5432)
  supabase-migrate-check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    # Só roda se o secret estiver configurado; usa env pois o contexto `secrets`
    # não é suportado diretamente neste `if` em alguns cenários (ex.: forks).
    if: ${{ env.SUPABASE_DB_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Supabase migrations
        run: |
          npx supabase db push --db-url "$SUPABASE_DB_URL" --dry-run
