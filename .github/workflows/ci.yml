# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main, master, develop, feat/*]
  pull_request:
    branches: [main, master, develop, feat/*]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build

  # Valida migrations via Session pooler (IPv4). Requer secret SUPABASE_DB_URL.
  # Obtenha em: Supabase Dashboard → Connect → Session pooler (porta 5432)
  supabase-migrate-check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    # Só corre se SUPABASE_DB_URL estiver definido no repositório.
    # Usar secrets.* no if é o padrão GitHub; NÃO uses env.SUPABASE_DB_URL no if do job — costuma falhar.
    # PRs de forks: secret não existe → job skipped (esperado).
    if: secrets.SUPABASE_DB_URL != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Supabase migrations
        run: |
          npx supabase db push --db-url "$SUPABASE_DB_URL" --dry-run
