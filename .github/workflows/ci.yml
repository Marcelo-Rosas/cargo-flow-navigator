name: CI

on:
  push:
    branches: [main, master, develop, feat/*]
  pull_request:
    branches: [main, master, develop, feat/*]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build
