name: Lighthouse Audit

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Install Lighthouse + serve + wait-on
        run: npm install --no-save lighthouse serve wait-on

      - name: Start local server
        run: npx serve -s dist -l 3000 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 15000

      - name: Run Lighthouse Audit
        run: node scripts/lighthouse-audit.mjs http://localhost:3000

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json
          if-no-files-found: ignore

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('./lighthouse-report.json')) return;
            const report = JSON.parse(fs.readFileSync('./lighthouse-report.json', 'utf-8'));
            const s = report.categories;
            const score = (cat) => Math.round(s[cat].score * 100);
            const thresholds = { performance: 75, accessibility: 90, 'best-practices': 85, seo: 90 };
            const icon = (cat) => score(cat) >= thresholds[cat] ? '✅' : '❌';
            const body = [
              '## 📊 Lighthouse Audit',
              '',
              '| Categoria | Score | Status |',
              '|-----------|-------|--------|',
              `| Performance | ${score('performance')} | ${icon('performance')} |`,
              `| Accessibility | ${score('accessibility')} | ${icon('accessibility')} |`,
              `| Best Practices | ${score('best-practices')} | ${icon('best-practices')} |`,
              `| SEO | ${score('seo')} | ${icon('seo')} |`,
              '',
              `[📈 Report completo](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
