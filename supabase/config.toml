# ────────────────────────────────────────────────────────────────────
# [auth] – Referência para dev local (supabase start).
# A configuração REAL de produção vive no Dashboard do Supabase:
#   Authentication → URL Configuration
# Mantenha esta seção sincronizada manualmente como documentação.
# ────────────────────────────────────────────────────────────────────
[auth]
site_url = "https://cargo-flow-navigator.vercel.app"
additional_redirect_urls = [
  # Dev local
  "http://localhost:8080/",
  "http://localhost:8080/auth",
  "http://localhost:8080/reset-password",
  # Domínio principal
  "https://cargo-flow-navigator.vercel.app/",
  "https://cargo-flow-navigator.vercel.app/**",
  # URL canônica Vercel (redirect)
  "https://cargo-flow-navigator-marcelo-rosas-projects.vercel.app/",
  "https://cargo-flow-navigator-marcelo-rosas-projects.vercel.app/**",
  # Preview deploys – wildcard para branches
  "https://cargo-*-flow-navigator-marcelo-rosas-projects.vercel.app",
  "https://cargo-*-flow-navigator-marcelo-rosas-projects.vercel.app/**",
]

[functions.import-price-table]
verify_jwt = true

[functions.calculate-freight]
verify_jwt = true

[functions.lookup-cep]
verify_jwt = false  # utilitário público (consulta ViaCEP/BrasilAPI/OpenCEP), sem dados sensíveis

[functions.calculate-distance]
verify_jwt = false  # utilitário público (geocode+rota), sem dados sensíveis

[functions.calculate-distance-webrouter]
verify_jwt = false  # utilitário público (distância CEP→CEP), sem dados sensíveis

[functions.price-row]
verify_jwt = true

[functions.ensure-financial-document]
verify_jwt = false  # Gateway 401 Invalid JWT; função valida Authorization manualmente

[functions.send-quote-email]
verify_jwt = false  # Gateway 401 Invalid JWT; função valida Authorization manualmente

[functions.ai-financial-agent]
verify_jwt = false  # Função usa SERVICE_ROLE_KEY internamente

[functions.ai-operational-agent]
verify_jwt = false  # Função usa SERVICE_ROLE_KEY internamente

[functions.invite-user]
verify_jwt = false  # Função valida admin via is_admin() RPC

[functions.process-payment-proof]
verify_jwt = false  # Chamado pelo workflow-orchestrator com service role

[functions.reconcile-trip]
verify_jwt = false  # Valida Authorization manualmente
